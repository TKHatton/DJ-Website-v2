<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="240" height="80" fill="#1A1A1A"/>

  <!-- Mark: dashes + chevron, centered -->
  <g transform="translate(80, 12)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left dashes -->
    <line x1="0"  y1="17" x2="12" y2="17" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="16" y1="17" x2="28" y2="17" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Chevron -->
    <polyline points="30,17 40,3 50,17" stroke="#E2725B" stroke-width="2.5" fill="none"/>
    <!-- Right dashes -->
    <line x1="52" y1="17" x2="64" y2="17" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="68" y1="17" x2="80" y2="17" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text
    x="120"
    y="58"
    text-anchor="middle"
    font-family="'Sora', sans-serif"
    font-weight="700"
    font-size="10"
    letter-spacing="2"
    fill="#FFFFFF"
  >DIGITAL JAYWALKING</text>
</svg>
